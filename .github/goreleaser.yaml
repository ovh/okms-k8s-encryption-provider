version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: okms-k8s-encryption-provider
    main: ./cmd/okms-k8s-encryption-provider
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}-{{ .Version }}"

archives:
  - formats: [ 'zip' ]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  github:
    owner: ovh
    name: okms-k8s-encryption-provider

  footer: |

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).